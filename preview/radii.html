<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;align-items:flex-end;gap:16px}
.tile{display:flex;flex-direction:column;gap:6px;align-items:center}
.box{background:var(--gray-100);border:1px solid var(--border-default);width:72px;height:72px}
.lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-secondary)}
</style></head><body>
<div class="row">
  <div class="tile"><div class="box" style="border-radius:4px"></div><div class="lbl">xs · 4</div></div>
  <div class="tile"><div class="box" style="border-radius:6px"></div><div class="lbl">sm · 6</div></div>
  <div class="tile"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
  <div class="tile"><div class="box" style="border-radius:10px"></div><div class="lbl">lg · 10</div></div>
  <div class="tile"><div class="box" style="border-radius:12px"></div><div class="lbl">xl · 12</div></div>
  <div class="tile"><div class="box" style="border-radius:16px"></div><div class="lbl">2xl · 16</div></div>
  <div class="tile"><div class="box" style="border-radius:9999px"></div><div class="lbl">pill</div></div>
</div></body></html>
