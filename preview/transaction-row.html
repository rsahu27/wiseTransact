<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;background:#fff;font-family:var(--font-sans)}
.row{display:flex;align-items:center;height:64px;padding:0 16px;border-bottom:1px solid var(--border-subtle)}
.row:last-child{border:0}
.dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:12px}
.dot i{width:12px;height:12px;border-radius:50%;display:block}
.body{flex:1}
.body .t{font-size:14px;font-weight:500;color:var(--fg-primary)}
.body .s{font-size:12px;color:var(--fg-secondary);margin-top:2px}
.amt{font-weight:600;font-variant-numeric:tabular-nums;font-size:15px}
</style></head><body>
<div class="row">
  <div class="dot" style="background:var(--expense-bg)"><i style="background:var(--expense-fg)"></i></div>
  <div class="body"><div class="t">Swiggy</div><div class="s">Food &amp; Dining · UPI</div></div>
  <div class="amt" style="color:var(--expense-fg)">-₹340</div>
</div>
<div class="row">
  <div class="dot" style="background:var(--income-bg)"><i style="background:var(--income-fg)"></i></div>
  <div class="body"><div class="t">Salary — Acme</div><div class="s">Salary · HDFC Savings</div></div>
  <div class="amt" style="color:var(--income-fg)">+₹62,400</div>
</div>
<div class="row">
  <div class="dot" style="background:var(--transfer-bg)"><i style="background:var(--transfer-fg)"></i></div>
  <div class="body"><div class="t">HDFC → ICICI</div><div class="s">Transfer · Bank</div></div>
  <div class="amt" style="color:var(--transfer-fg)">₹5,000</div>
</div>
</body></html>
