<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;align-items:flex-end;gap:14px}
.bar{background:var(--emerald-500);border-radius:3px}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px}
.lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-secondary)}
</style></head><body>
<div class="row">
  <div class="tile"><div class="bar" style="width:32px;height:4px"></div><div class="lbl">1·4</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:8px"></div><div class="lbl">2·8</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:12px"></div><div class="lbl">3·12</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:16px"></div><div class="lbl">4·16</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:20px"></div><div class="lbl">5·20</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:24px"></div><div class="lbl">6·24</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">8·32</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:40px"></div><div class="lbl">10·40</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:48px"></div><div class="lbl">12·48</div></div>
  <div class="tile"><div class="bar" style="width:32px;height:64px"></div><div class="lbl">16·64</div></div>
</div></body></html>
