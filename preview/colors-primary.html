<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#fff}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:10px;padding:12px;height:96px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-subtle)}
.sw .name{font-size:11px;font-weight:600;letter-spacing:.4px}
.sw .hex{font-size:10px;font-family:var(--font-mono);opacity:.85}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--emerald-50);color:var(--emerald-900)"><div class="name">emerald-50</div><div class="hex">#ECFDF5</div></div>
  <div class="sw" style="background:var(--emerald-300);color:var(--emerald-900)"><div class="name">emerald-300</div><div class="hex">#6EE7B7</div></div>
  <div class="sw" style="background:var(--emerald-500);color:#fff"><div class="name">emerald-500</div><div class="hex">#10B981</div></div>
  <div class="sw" style="background:var(--emerald-700);color:#fff"><div class="name">emerald-700 · CTA</div><div class="hex">#047857</div></div>
  <div class="sw" style="background:var(--emerald-900);color:#fff"><div class="name">emerald-900</div><div class="hex">#064E3B</div></div>
</div></body></html>
