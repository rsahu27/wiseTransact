<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-subtle)}
.row:last-child{border:0}
.lbl{font-size:12px;color:var(--fg-secondary)}
.amt{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";font-weight:600;letter-spacing:-.2px}
</style></head><body>
<div class="row"><div class="lbl">Splash / hero</div><div class="amt" style="font-size:38px;color:var(--expense-fg)">-₹340.00</div></div>
<div class="row"><div class="lbl">Home summary</div><div class="amt" style="font-size:18px;color:var(--gray-900)">₹62,400</div></div>
<div class="row"><div class="lbl">List row</div><div class="amt" style="font-size:15px;color:var(--income-fg)">+₹62,400</div></div>
<div class="row"><div class="lbl">List row · expense</div><div class="amt" style="font-size:15px;color:var(--expense-fg)">-₹649</div></div>
<div class="row"><div class="lbl">List row · transfer</div><div class="amt" style="font-size:15px;color:var(--transfer-fg)">₹5,000</div></div>
<div style="margin-top:16px;font-size:10px;color:var(--fg-muted);font-family:var(--font-mono)">Inter · font-variant-numeric: tabular-nums</div>
</body></html>
