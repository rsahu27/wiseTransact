<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#fff}
.row{display:grid;grid-template-columns:repeat(9,1fr);gap:6px}
.sw{border-radius:8px;padding:10px 8px;height:88px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-subtle)}
.sw .name{font-size:10px;font-weight:600}
.sw .hex{font-size:9px;font-family:var(--font-mono);opacity:.85}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--white);color:var(--gray-900)"><div class="name">white</div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:var(--gray-50);color:var(--gray-900)"><div class="name">gray-50</div><div class="hex">#F9FAFB</div></div>
  <div class="sw" style="background:var(--gray-100);color:var(--gray-900)"><div class="name">gray-100</div><div class="hex">#F3F4F6</div></div>
  <div class="sw" style="background:var(--gray-200);color:var(--gray-900)"><div class="name">gray-200</div><div class="hex">#E5E7EB</div></div>
  <div class="sw" style="background:var(--gray-300);color:var(--gray-900)"><div class="name">gray-300</div><div class="hex">#D1D5DB</div></div>
  <div class="sw" style="background:var(--gray-400);color:#fff"><div class="name">gray-400</div><div class="hex">#9CA3AF</div></div>
  <div class="sw" style="background:var(--gray-500);color:#fff"><div class="name">gray-500</div><div class="hex">#6B7280</div></div>
  <div class="sw" style="background:var(--gray-700);color:#fff"><div class="name">gray-700</div><div class="hex">#374151</div></div>
  <div class="sw" style="background:var(--gray-900);color:#fff"><div class="name">gray-900</div><div class="hex">#111827</div></div>
</div></body></html>
