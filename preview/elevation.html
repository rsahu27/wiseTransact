<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--gray-50);font-family:var(--font-sans)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.tile{background:#fff;height:88px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--font-mono);color:var(--fg-secondary)}
.fab{background:var(--emerald-700);color:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
</style></head><body>
<div class="row">
  <div class="tile" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="tile" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="tile" style="box-shadow:var(--shadow-md)">md · sheet</div>
  <div class="tile" style="background:transparent;box-shadow:none"><div class="fab" style="box-shadow:var(--shadow-fab)">+</div></div>
</div></body></html>
