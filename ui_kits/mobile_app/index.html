<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WiseTransact — Mobile UI Kit</title>
<link rel="stylesheet" href="tokens.css">
<style>
  body { background: linear-gradient(180deg, #1a1d23 0%, #0e1014 100%); margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .root { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .root .head { color: #fff; text-align: center; }
  .root .head h1 { font-family: var(--font-sans); font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -.3px; }
  .root .head p { color: #9ca3af; font-size: 13px; margin: 6px 0 0; font-family: var(--font-sans); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="root">
  <div class="head">
    <h1>WiseTransact — Mobile UI Kit</h1>
    <p>Tap the FAB or "+ Add Transaction" to flow through. Use bottom tabs to navigate.</p>
  </div>
  <div id="root"></div>
</div>
<script type="text/babel" src="components/Icon.jsx"></script>
<script type="text/babel" src="components/Primitives.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="screens/Onboarding.jsx"></script>
<script type="text/babel" src="screens/Core.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
